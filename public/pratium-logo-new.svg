<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 280" role="img">
  <title>Pratium Logo</title>
  <desc>Pratium platformu mavi arka planlı logo</desc>
  <defs>
    <radialGradient id="bgGlow" cx="30%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#00ADDF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0083B0;stop-opacity:1"/>
    </radialGradient>
    <radialGradient id="bgGlow2" cx="80%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0095C8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#007AAB;stop-opacity:1"/>
    </radialGradient>
    <radialGradient id="blob1" cx="20%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="80%" cy="60%" r="50%">
      <stop offset="0%" style="stop-color:#005880;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#005880;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="680" height="280" fill="url(#bgGlow)" rx="20"/>
  <rect width="680" height="280" fill="url(#bgGlow2)" rx="20" opacity="0.5"/>
  <ellipse cx="150" cy="130" rx="200" ry="160" fill="url(#blob1)"/>
  <ellipse cx="540" cy="160" rx="180" ry="140" fill="url(#blob2)"/>
  <rect x="60" y="2" width="560" height="1.5" rx="1" fill="white" opacity="0.25"/>
  <circle cx="155" cy="140" r="72" fill="none" stroke="white" stroke-width="1" opacity="0.15"/>
  <circle cx="155" cy="140" r="54" fill="none" stroke="white" stroke-width="1.5" opacity="0.30"/>
  <circle cx="155" cy="140" r="32" fill="white" opacity="0.95" filter="url(#glow)"/>
  <circle cx="155" cy="140" r="32" fill="none" stroke="white" stroke-width="0.5" opacity="0.5"/>
  <text x="155" y="153" text-anchor="middle" font-family="'Cavolini', cursive" font-size="34" fill="#0095C8" font-weight="400">p</text>
  <circle cx="155" cy="68" r="5" fill="white" opacity="0.8"/>
  <circle cx="155" cy="212" r="5" fill="white" opacity="0.6"/>
  <circle cx="83" cy="140" r="5" fill="white" opacity="0.8"/>
  <circle cx="227" cy="140" r="5" fill="white" opacity="0.6"/>
  <circle cx="105" cy="90" r="3" fill="white" opacity="0.4"/>
  <circle cx="205" cy="90" r="3" fill="white" opacity="0.4"/>
  <circle cx="105" cy="190" r="3" fill="white" opacity="0.4"/>
  <circle cx="205" cy="190" r="3" fill="white" opacity="0.4"/>
  <text x="265" y="130" font-family="'Cavolini', cursive" font-size="74" fill="white" font-weight="400" opacity="0.97">pratium</text>
  <text x="267" y="172" font-family="'Plus Jakarta Sans', sans-serif" font-size="14" fill="rgba(255,255,255,0.55)" font-weight="600" letter-spacing="3.5">PRATIK YAP, NETLERINI ARTIR</text>
  <rect x="267" y="186" width="330" height="1" rx="0.5" fill="white" opacity="0.2"/>
  <text x="267" y="213" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" fill="rgba(255,255,255,0.35)" font-weight="400">pratium.com</text>
  <rect x="60" y="276" width="560" height="1.5" rx="1" fill="white" opacity="0.25"/>
